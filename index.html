<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolfPark — 골프채 완전 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --dark: #0d1a0d;
  --green: #2d6a3f;
  --green2: #4a9c5a;
  --green3: #c8e6c9;
  --gold: #b8860b;
  --gold2: #d4a843;
  --cream: #fdf9f2;
  --text: #1a1a1a;
  --muted: #7a7a6e;
  --border: #e0ddd5;
  --surface: #ffffff;
  --men: #1a3a5c;
  --women: #5c1a3a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow-x:hidden; }

/* ── PAGES ── */
.page { display:none; min-height:100vh; }
.page.active { display:block; }

/* ══════════════════════════
   HOME PAGE
══════════════════════════ */
#home {
  background: var(--dark);
  position: relative; overflow: hidden;
}
.home-bg {
  position:absolute; inset:0;
  background: radial-gradient(ellipse 120% 80% at 50% -10%, #1a3d1a 0%, #0d1a0d 60%);
}
.home-bg::before {
  content:'';
  position:absolute; inset:0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px),
                    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px);
}

.home-nav {
  position: relative; z-index:10;
  display:flex; align-items:center; justify-content:center;
  padding: 2rem;
}
.site-logo {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:900;
  color:#fff; letter-spacing:-0.02em;
}
.site-logo span { color:var(--gold2); }

.home-hero {
  position:relative; z-index:5;
  text-align:center;
  padding: 1rem 2rem 0;
}
.home-tagline {
  display:inline-block;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:0.35rem 1.2rem;
  font-size:0.72rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--gold2); margin-bottom:1.2rem;
}
.home-title {
  font-family:'Playfair Display',serif;
  font-size: clamp(2.2rem, 7vw, 5rem);
  font-weight:900; line-height:1.05;
  color:#fff; margin-bottom:0.8rem;
}
.home-title em { color:var(--gold2); font-style:italic; }
.home-sub { color:rgba(255,255,255,0.5); font-size:0.95rem; margin-bottom:3rem; }

/* GENDER CARDS */
.gender-split {
  position:relative; z-index:5;
  display:grid; grid-template-columns:1fr 1fr;
  gap:1.5rem; max-width:900px; margin:0 auto;
  padding: 0 2rem 4rem;
}
.gender-card {
  border-radius:24px; overflow:hidden;
  cursor:pointer; position:relative;
  transition: transform 0.35s cubic-bezier(.2,.8,.2,1), box-shadow 0.35s;
  border: 1px solid rgba(255,255,255,0.08);
}
.gender-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 32px 64px rgba(0,0,0,0.5); }

.gender-card-inner {
  padding: 2.5rem 2rem 2rem;
  display:flex; flex-direction:column; align-items:center;
  min-height: 420px; position:relative;
}
.card-men { background: linear-gradient(160deg, #0d2137 0%, #1a3a5c 40%, #0d2a1a 100%); }
.card-women { background: linear-gradient(160deg, #2a0d1a 0%, #5c1a3a 40%, #1a0d2a 100%); }

/* SVG Golfer Illustrations */
.golfer-svg { width:200px; height:240px; margin: 1rem auto; display:block; }

.gender-label {
  font-family:'Playfair Display',serif;
  font-size:1.8rem; font-weight:900;
  color:#fff; margin-top:0.5rem;
}
.gender-sub { color:rgba(255,255,255,0.5); font-size:0.8rem; margin-top:0.3rem; }
.gender-arrow {
  margin-top:1.5rem;
  width:44px; height:44px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem;
  transition: transform 0.2s;
}
.card-men .gender-arrow { background: rgba(255,255,255,0.1); }
.card-women .gender-arrow { background: rgba(255,255,255,0.1); }
.gender-card:hover .gender-arrow { transform: translateX(4px); }

.card-shine {
  position:absolute; top:0; left:-100%;
  width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transition: left 0.6s;
}
.gender-card:hover .card-shine { left:140%; }

/* ══════════════════════════
   GENDER PAGE (brand list)
══════════════════════════ */
#gender-page {
  background: var(--cream);
}
.inner-nav {
  background: var(--dark);
  display:flex; align-items:center; gap:1rem;
  padding:1rem 2rem;
}
.back-btn {
  background:none; border:1px solid rgba(255,255,255,0.2); border-radius:20px;
  color:rgba(255,255,255,0.7); font-size:0.8rem; padding:0.4rem 1rem;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  transition:all 0.2s;
}
.back-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.breadcrumb { color:rgba(255,255,255,0.4); font-size:0.8rem; }
.breadcrumb span { color:rgba(255,255,255,0.8); }

.gender-hero {
  padding: 3rem 2rem 2rem;
  text-align:center;
  position:relative; overflow:hidden;
}
.gender-hero-men { background: linear-gradient(135deg, #0d2137, #1a3a5c); }
.gender-hero-women { background: linear-gradient(135deg, #2a0d1a, #5c1a3a); }
.gender-hero h2 {
  font-family:'Playfair Display',serif;
  font-size:2.5rem; font-weight:900; color:#fff;
}
.gender-hero p { color:rgba(255,255,255,0.5); margin-top:0.5rem; }

.brands-section {
  max-width:1000px; margin:0 auto; padding:3rem 2rem;
}
.brands-section h3 {
  font-size:0.75rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted); margin-bottom:1.5rem;
  border-bottom:1px solid var(--border); padding-bottom:0.75rem;
}
.brands-grid {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:1rem;
}
.brand-logo-card {
  background:var(--surface); border:2px solid var(--border); border-radius:16px;
  padding:1.5rem 1rem; text-align:center; cursor:pointer;
  transition:all 0.25s cubic-bezier(.2,.8,.2,1);
  display:flex; flex-direction:column; align-items:center; gap:0.75rem;
}
.brand-logo-card:hover {
  border-color:var(--green2); transform:translateY(-4px);
  box-shadow:0 12px 32px rgba(45,106,63,0.15);
}
.brand-logo-svg { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-logo-name { font-weight:700; font-size:0.85rem; color:var(--text); }
.brand-logo-origin { font-size:0.7rem; color:var(--muted); }
.brand-logo-count {
  background:var(--green3); color:var(--green); border-radius:10px;
  font-size:0.68rem; font-weight:700; padding:0.15rem 0.5rem;
}

/* ══════════════════════════
   BRAND PAGE (club types)
══════════════════════════ */
#brand-page { background:var(--bg); }

.brand-hero {
  background:var(--dark); padding:2rem;
  display:flex; align-items:center; gap:1.5rem;
}
.brand-hero-logo { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-hero-info h2 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; }
.brand-hero-info p { color:rgba(255,255,255,0.4); font-size:0.8rem; }

.type-tabs {
  display:flex; gap:0.5rem; padding:1.5rem 2rem 0;
  overflow-x:auto; max-width:1000px; margin:0 auto;
}
.type-tab {
  background:var(--surface); border:2px solid var(--border); border-radius:20px;
  padding:0.45rem 1.1rem; font-family:'Noto Sans KR',sans-serif;
  font-size:0.82rem; font-weight:700; cursor:pointer; white-space:nowrap;
  transition:all 0.2s; color:var(--muted);
}
.type-tab:hover { border-color:var(--green2); color:var(--green); }
.type-tab.active { background:var(--green); border-color:var(--green); color:#fff; }

.clubs-list {
  max-width:1000px; margin:0 auto; padding:1.5rem 2rem 4rem;
  display:grid; gap:1rem;
}

/* CLUB DETAIL CARD */
.club-detail-card {
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  overflow:hidden; transition:box-shadow 0.2s;
}
.club-detail-card:hover { box-shadow:0 8px 32px rgba(0,0,0,0.08); }

.club-card-header {
  padding:1.5rem 1.5rem 1rem;
  display:flex; align-items:flex-start; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.club-card-title h4 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
.club-card-title p { color:var(--muted); font-size:0.8rem; margin-top:0.2rem; }
.club-year-badge {
  background:var(--green3); color:var(--green); border-radius:8px;
  font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem;
}

.specs-wrap { padding:1.5rem; }
.specs-title { font-size:0.7rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }

.specs-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:0.75rem; }
.spec-box {
  background:var(--bg); border-radius:12px; padding:1rem;
  text-align:center; position:relative;
}
.spec-icon { font-size:1.4rem; margin-bottom:0.4rem; }
.spec-name { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.3rem; }
.spec-val { font-size:0.95rem; font-weight:700; color:var(--text); }
.spec-val small { font-size:0.7rem; font-weight:400; color:var(--muted); }

.dist-section { padding:0 1.5rem 1rem; }
.dist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
.dist-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
.dist-range { font-size:1.1rem; font-weight:900; color:var(--green); }
.dist-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.dist-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--green),var(--gold2)); transition:width 0.8s cubic-bezier(.2,.8,.2,1); }
.dist-scale { display:flex; justify-content:space-between; margin-top:0.3rem; font-size:0.65rem; color:var(--muted); }

.club-tip {
  margin:0 1.5rem 1.5rem;
  background:linear-gradient(135deg, #f0f7f1, #e8f4e8);
  border-left:3px solid var(--green2); border-radius:0 12px 12px 0;
  padding:0.9rem 1rem; font-size:0.82rem; color:var(--green);
  line-height:1.6;
}
.club-tip strong { font-weight:700; }

/* COMMENTS */
.comments-section {
  border-top:1px solid var(--border); padding:1.5rem;
}
.comments-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:1rem; }
.comment-form { display:flex; gap:0.75rem; margin-bottom:1.25rem; }
.comment-avatar-placeholder {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:var(--green3); display:flex; align-items:center; justify-content:center;
  font-size:1rem;
}
.comment-input-wrap { flex:1; }
.comment-input {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
  padding:0.65rem 1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem;
  color:var(--text); resize:none; transition:border-color 0.2s;
}
.comment-input:focus { outline:none; border-color:var(--green2); }
.comment-submit {
  margin-top:0.5rem;
  background:var(--green); border:none; border-radius:8px; color:#fff;
  font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700;
  padding:0.45rem 1rem; cursor:pointer; transition:background 0.2s;
}
.comment-submit:hover { background:var(--green2); }

.comment-item { display:flex; gap:0.75rem; margin-bottom:1rem; }
.comment-bubble { flex:1; background:var(--bg); border-radius:0 12px 12px 12px; padding:0.75rem 1rem; }
.comment-meta { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.3rem; }
.comment-author { font-size:0.8rem; font-weight:700; }
.comment-date { font-size:0.7rem; color:var(--muted); }
.comment-text { font-size:0.85rem; line-height:1.6; color:var(--text); }
.comment-likes { font-size:0.72rem; color:var(--muted); margin-top:0.4rem; cursor:pointer; }
.comment-likes:hover { color:var(--green); }

/* ── RESPONSIVE ── */
@media(max-width:600px) {
  .gender-split { grid-template-columns:1fr; }
  .specs-row { grid-template-columns:repeat(2,1fr); }
  .brand-hero { flex-direction:column; text-align:center; }
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.fade-up { animation:fadeUp 0.5s ease both; }
.fade-in { animation:fadeIn 0.4s ease both; }
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div id="home" class="page active">
  <div class="home-bg"></div>
  <nav class="home-nav">
    <div class="site-logo">Golf<span>Park</span></div>
  </nav>
  <div class="home-hero fade-up">
    <div class="home-tagline">🏌️ 한국 시판 골프채 완전 가이드</div>
    <h1 class="home-title">당신의 게임을<br><em>바꿀 클럽</em>을 찾아보세요</h1>
    <p class="home-sub">브랜드별 스펙 · 비거리 · 초보자 팁까지 한눈에</p>
  </div>
  <div class="gender-split">
    <!-- MEN -->
    <div class="gender-card" onclick="goGender('men')">
      <div class="card-shine"></div>
      <div class="gender-card-inner card-men">
        <!-- Male Golfer SVG -->
        <svg class="golfer-svg" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Sky/ground -->
          <ellipse cx="100" cy="220" rx="70" ry="12" fill="rgba(255,255,255,0.06)"/>
          <!-- Shadow -->
          <ellipse cx="100" cy="225" rx="45" ry="6" fill="rgba(0,0,0,0.3)"/>
          <!-- Body - torso -->
          <rect x="72" y="105" width="56" height="62" rx="12" fill="#1e4d7a"/>
          <!-- Collar -->
          <path d="M88 105 L100 118 L112 105" stroke="white" stroke-width="2" fill="none"/>
          <!-- Left arm (backswing raised) -->
          <path d="M72 115 Q40 85 28 60" stroke="#f5c99a" stroke-width="14" stroke-linecap="round" fill="none"/>
          <!-- Right arm (down) -->
          <path d="M128 120 Q148 140 158 158" stroke="#f5c99a" stroke-width="14" stroke-linecap="round" fill="none"/>
          <!-- Golf Club -->
          <line x1="158" y1="158" x2="168" y2="205" stroke="#c0c0c0" stroke-width="3" stroke-linecap="round"/>
          <rect x="162" y="203" width="14" height="6" rx="2" fill="#888"/>
          <!-- Head -->
          <circle cx="100" cy="78" r="26" fill="#f5c99a"/>
          <!-- Hair -->
          <path d="M76 68 Q78 50 100 48 Q122 50 124 68 Q115 58 100 58 Q85 58 76 68Z" fill="#3a2010"/>
          <!-- Face features -->
          <circle cx="92" cy="76" r="2.5" fill="#333"/>
          <circle cx="108" cy="76" r="2.5" fill="#333"/>
          <path d="M94 86 Q100 91 106 86" stroke="#c07050" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- Ear -->
          <ellipse cx="74" cy="80" rx="4" ry="6" fill="#e8b88a"/>
          <ellipse cx="126" cy="80" rx="4" ry="6" fill="#e8b88a"/>
          <!-- Cap -->
          <path d="M74 63 Q76 44 100 42 Q124 44 126 63 Z" fill="#1a3d6e"/>
          <rect x="70" y="60" width="60" height="8" rx="4" fill="#1a3d6e"/>
          <rect x="65" y="64" width="16" height="5" rx="2.5" fill="#1a3d6e"/>
          <!-- Pants -->
          <rect x="72" y="162" width="24" height="50" rx="8" fill="#2d4a6e"/>
          <rect x="104" y="162" width="24" height="50" rx="8" fill="#2d4a6e"/>
          <!-- Shoes -->
          <ellipse cx="84" cy="212" rx="16" ry="7" fill="#222"/>
          <ellipse cx="116" cy="212" rx="16" ry="7" fill="#222"/>
          <!-- Belt -->
          <rect x="72" y="160" width="56" height="6" rx="3" fill="#8B6914"/>
          <rect x="96" y="160" width="8" height="6" rx="1" fill="#c9a84c"/>
          <!-- Glove on left hand -->
          <circle cx="28" cy="60" r="10" fill="white" opacity="0.9"/>
          <!-- Left hand fingers -->
          <rect x="20" y="52" width="5" height="10" rx="2.5" fill="white"/>
          <rect x="26" y="50" width="5" height="12" rx="2.5" fill="white"/>
          <rect x="32" y="52" width="5" height="10" rx="2.5" fill="white"/>
        </svg>
        <div class="gender-label">남성 골프채</div>
        <div class="gender-sub">Men's Golf Clubs</div>
        <div class="gender-arrow">→</div>
      </div>
    </div>
    <!-- WOMEN -->
    <div class="gender-card" onclick="goGender('women')">
      <div class="card-shine"></div>
      <div class="gender-card-inner card-women">
        <!-- Female Golfer SVG -->
        <svg class="golfer-svg" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="100" cy="225" rx="45" ry="6" fill="rgba(0,0,0,0.3)"/>
          <!-- Skirt -->
          <path d="M78 162 Q80 205 68 215 Q85 218 100 217 Q115 218 132 215 Q120 205 122 162 Z" fill="#e75480"/>
          <!-- Body torso -->
          <rect x="76" y="105" width="48" height="60" rx="10" fill="#ff6b9d"/>
          <!-- Collar V -->
          <path d="M90 105 L100 120 L110 105" stroke="white" stroke-width="1.5" fill="#e75480"/>
          <!-- Left arm (swing follow-through) -->
          <path d="M76 115 Q50 95 35 72" stroke="#f5c99a" stroke-width="13" stroke-linecap="round" fill="none"/>
          <!-- Right arm -->
          <path d="M124 118 Q145 135 155 155" stroke="#f5c99a" stroke-width="13" stroke-linecap="round" fill="none"/>
          <!-- Club -->
          <line x1="155" y1="155" x2="163" y2="205" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="158" y="203" width="12" height="5" rx="2" fill="#888"/>
          <!-- Head -->
          <circle cx="100" cy="76" r="24" fill="#f5c99a"/>
          <!-- Long hair left -->
          <path d="M78 70 Q70 100 72 130 Q80 125 82 108 Q80 90 84 78 Z" fill="#3a1a05"/>
          <!-- Long hair right -->
          <path d="M122 70 Q130 100 128 130 Q120 125 118 108 Q120 90 116 78 Z" fill="#3a1a05"/>
          <!-- Hair top -->
          <path d="M78 65 Q80 46 100 44 Q120 46 122 65 Q112 56 100 56 Q88 56 78 65Z" fill="#3a1a05"/>
          <!-- Face -->
          <circle cx="93" cy="75" r="2.5" fill="#333"/>
          <circle cx="107" cy="75" r="2.5" fill="#333"/>
          <!-- Eyelashes -->
          <path d="M91 72 L90 70 M93 71.5 L93 69 M95 72 L96 70" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M105 72 L104 70 M107 71.5 L107 69 M109 72 L110 70" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M95 85 Q100 90 105 85" stroke="#e05080" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- Cheeks -->
          <circle cx="88" cy="82" r="5" fill="rgba(255,150,150,0.3)"/>
          <circle cx="112" cy="82" r="5" fill="rgba(255,150,150,0.3)"/>
          <!-- Visor/hat -->
          <path d="M78 62 Q80 44 100 42 Q120 44 122 62" fill="#c0006e"/>
          <rect x="74" y="60" width="52" height="7" rx="3.5" fill="#c0006e"/>
          <rect x="66" y="63" width="18" height="5" rx="2.5" fill="#c0006e"/>
          <!-- Legs -->
          <rect x="78" y="210" width="18" height="20" rx="6" fill="#f5c99a"/>
          <rect x="104" y="210" width="18" height="20" rx="6" fill="#f5c99a"/>
          <!-- Shoes -->
          <ellipse cx="87" cy="230" rx="14" ry="6" fill="#fff"/>
          <ellipse cx="113" cy="230" rx="14" ry="6" fill="#fff"/>
          <!-- Glove -->
          <circle cx="35" cy="72" r="9" fill="white" opacity="0.85"/>
        </svg>
        <div class="gender-label">여성 골프채</div>
        <div class="gender-sub">Women's Golf Clubs</div>
        <div class="gender-arrow">→</div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ GENDER PAGE ══════════ -->
<div id="gender-page" class="page">
  <div class="inner-nav">
    <button class="back-btn" onclick="goHome()">← 홈으로</button>
    <span class="breadcrumb">홈 / <span id="gender-breadcrumb"></span></span>
  </div>
  <div class="gender-hero" id="gender-hero">
    <h2 id="gender-title"></h2>
    <p id="gender-desc"></p>

// ── STATE ──
let currentGender = 'men';
let currentBrand = '';
let currentType = '';
let commentsStore = {}; // key: brandId+clubName

function getComments(key) {
  if (!commentsStore[key]) commentsStore[key] = [];
  return commentsStore[key];
}

// ── NAVIGATION ──
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function goHome() { showPage('home'); }
function goBrandBack() { showPage('gender-page'); }

function goGender(gender) {
  currentGender = gender;
  document.getElementById('gender-breadcrumb').textContent = gender === 'men' ? '남성 골프채' : '여성 골프채';
  const hero = document.getElementById('gender-hero');
  hero.className = 'gender-hero ' + (gender === 'men' ? 'gender-hero-men' : 'gender-hero-women');
  document.getElementById('gender-title').textContent = gender === 'men' ? '👨 남성 골프채' : '👩 여성 골프채';
  document.getElementById('gender-desc').textContent = gender === 'men' ? '브랜드를 선택하면 클럽 목록을 볼 수 있어요' : '여성 전용 클럽을 브랜드별로 비교해보세요';
  renderBrands(gender);
  showPage('gender-page');
}

function renderBrands(gender) {
  const grid = document.getElementById('brands-grid');
  const brands = brandsData[gender];
  grid.innerHTML = brands.map(b => {
    const clubs = clubsData[b.id] || {};
    const count = Object.values(clubs).flat().length;
    return `<div class="brand-logo-card" onclick="goBrand('${b.id}')">
      <div class="brand-logo-svg">${makeBrandLogo(b)}</div>
      <div class="brand-logo-name">${b.name}</div>
      <div class="brand-logo-origin">${b.origin}</div>
      <div class="brand-logo-count">${count}개 클럽</div>
    </div>`;
  }).join('');
}

function goBrand(brandId) {
  currentBrand = brandId;
  const genderBrands = brandsData[currentGender];
  const brandInfo = genderBrands.find(b => b.id === brandId);
  document.getElementById('brand-breadcrumb-g').textContent = currentGender === 'men' ? '남성' : '여성';
  document.getElementById('brand-breadcrumb-b').textContent = brandInfo?.name || brandId;
  document.getElementById('brand-hero-name').textContent = brandInfo?.name || brandId;
  document.getElementById('brand-hero-origin').textContent = brandInfo?.origin || '';
  document.getElementById('brand-hero-logo').innerHTML = makeBrandLogo(brandInfo);

  const clubs = clubsData[brandId] || {};
  const types = Object.keys(clubs);
  currentType = types[0] || '';

  // tabs
  const tabsEl = document.getElementById('type-tabs');
  tabsEl.innerHTML = types.map(t =>
    `<button class="type-tab ${t === currentType ? 'active' : ''}" onclick="selectType('${t}', this)">${typeEmoji(t)} ${t}</button>`
  ).join('');

  renderClubs();
  showPage('brand-page');
}

function typeEmoji(t) {
  return {드라이버:'🚀',아이언:'🏌️',페어웨이우드:'🌲',하이브리드:'🔀',유틸리티:'🔀',웨지:'🪙',퍼터:'🎯'}[t] || '🏷️';
}

function selectType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderClubs();
}

function renderClubs() {
  const clubs = (clubsData[currentBrand] || {})[currentType] || [];
  const listEl = document.getElementById('clubs-list');
  listEl.innerHTML = clubs.map((c, idx) => {
    const key = currentBrand + '_' + c.name;
    const allComments = [...(c.preComments || []), ...getComments(key)];
    const isPutter = c.dist[1] === 0;
    const barPct = isPutter ? 0 : Math.round((c.dist[0] / 300) * 100);
    const bar2Pct = isPutter ? 0 : Math.round((c.dist[1] / 300) * 100);

    return `<div class="club-detail-card fade-up" style="animation-delay:${idx*0.08}s">
      <div class="club-card-header">
        <div class="club-card-title">
          <h4>${c.name}</h4>
          <p>${currentType} · ${c.shaft}</p>
        </div>
        <span class="club-year-badge">${c.year}</span>
      </div>

      <div class="specs-wrap">
        <div class="specs-title">📋 스펙 한눈에 보기</div>
        <div class="specs-row">
          <div class="spec-box">
            <div class="spec-icon">⚖️</div>
            <div class="spec-name">헤드 무게</div>
            <div class="spec-val">${c.weight}</div>
          </div>
          <div class="spec-box">
            <div class="spec-icon">📐</div>
            <div class="spec-name">로프트각</div>
            <div class="spec-val">${c.loft}</div>
          </div>
          <div class="spec-box">
            <div class="spec-icon">🚀</div>
            <div class="spec-name">이상적 발사각</div>
            <div class="spec-val">${c.launch}</div>
          </div>
          <div class="spec-box">
            <div class="spec-icon">🏹</div>
            <div class="spec-name">탄도</div>
            <div class="spec-val">${c.traj}</div>
          </div>
          <div class="spec-box" style="grid-column:1/-1">
            <div class="spec-icon">🪝</div>
            <div class="spec-name">샤프트</div>
            <div class="spec-val" style="font-size:0.82rem">${c.shaft}</div>
          </div>
        </div>
      </div>

      ${!isPutter ? `<div class="dist-section">
        <div class="dist-header">
          <span class="dist-label">🎯 아마추어 평균 비거리</span>
          <span class="dist-range">${c.dist[0]}m ~ ${c.dist[1]}m</span>
        </div>
        <div class="dist-bar">
          <div class="dist-fill" style="width:${bar2Pct}%"></div>
        </div>
        <div class="dist-scale"><span>0m</span><span>100m</span><span>200m</span><span>300m+</span></div>
      </div>` : ''}

      <div class="club-tip">
        <strong>💡 초보자 TIP</strong><br>${c.tip}
      </div>

      <!-- COMMENTS -->
      <div class="comments-section" id="comments-${key.replace(/\s/g,'_')}">
        <div class="comments-title">💬 사용자 평가 (${allComments.length}개)</div>
        <div class="comment-form">
          <div class="comment-avatar-placeholder">🙂</div>
          <div class="comment-input-wrap">
            <textarea class="comment-input" id="cinput-${idx}" rows="2" placeholder="이 클럽 사용해보셨나요? 솔직한 후기를 남겨주세요!"></textarea>
            <button class="comment-submit" onclick="addComment('${key}', ${idx}, '${c.name}')">등록</button>
          </div>
        </div>
        <div id="clist-${idx}">
          ${allComments.map(cm => commentHTML(cm)).join('')}
        </div>
      </div>
    </div>`;
  }).join('') || '<p style="text-align:center;padding:3rem;color:var(--muted)">해당 종류의 클럽 정보가 없습니다</p>';
}

function commentHTML(cm) {
  const colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
  const col = colors[Math.abs(cm.a.charCodeAt(0)) % colors.length];
  return `<div class="comment-item">
    <div class="comment-avatar-placeholder" style="background:${col};color:#fff;font-size:0.8rem;font-weight:700">${cm.a[0]}</div>
    <div class="comment-bubble">
      <div class="comment-meta">
        <span class="comment-author">${cm.a}</span>
        <span class="comment-date">${cm.date || '방금'}</span>
      </div>
      <div class="comment-text">${cm.t}</div>
      <div class="comment-likes">👍 좋아요 ${cm.l}</div>
    </div>
  </div>`;
}

function addComment(key, idx, clubName) {
  const input = document.getElementById('cinput-' + idx);
  const text = input.value.trim();
  if (!text) { alert('후기 내용을 입력해주세요!'); return; }
  if (!commentsStore[key]) commentsStore[key] = [];
  const names = ['골프왕','버디킹','파온러버','그린마스터','드라이버신'];
  const newComment = { a: names[Math.floor(Math.random()*names.length)], t: text, l: 0, date: '방금' };
  commentsStore[key].push(newComment);
  const clubs = (clubsData[currentBrand] || {})[currentType] || [];
  const c = clubs[idx];
  const allComments = [...(c.preComments || []), ...getComments(key)];
  const listEl = document.getElementById('clist-' + idx);
  listEl.innerHTML = allComments.map(cm => commentHTML(cm)).join('');
  input.value = '';
}
</script>
