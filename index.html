<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolfPark — 골프채 완전 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f4ef; --dark:#0d1a0d; --green:#2d6a3f; --green2:#4a9c5a;
  --green3:#c8e6c9; --gold:#b8860b; --gold2:#d4a843; --cream:#fdf9f2;
  --text:#1a1a1a; --muted:#7a7a6e; --border:#e0ddd5; --surface:#ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow-x:hidden; }
.page { display:none; min-height:100vh; }
.page.active { display:block; }

/* HOME */
#home { background:var(--dark); position:relative; overflow:hidden; }
.home-bg { position:absolute; inset:0; background:radial-gradient(ellipse 120% 80% at 50% -10%, #1a3d1a 0%, #0d1a0d 60%); }
.home-nav { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:1.5rem 2rem; }
.site-logo { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:#fff; }
.site-logo span { color:var(--gold2); }
.comm-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; font-weight:700; padding:0.5rem 1.2rem; cursor:pointer; }
.home-hero { position:relative; z-index:5; text-align:center; padding:2rem 2rem 0; }
.home-tagline { display:inline-block; border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:0.35rem 1.2rem; font-size:0.72rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold2); margin-bottom:1.2rem; }
.home-title { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,7vw,4.5rem); font-weight:900; line-height:1.05; color:#fff; margin-bottom:0.8rem; }
.home-title em { color:var(--gold2); font-style:italic; }
.home-sub { color:rgba(255,255,255,0.5); font-size:0.95rem; margin-bottom:3rem; }
.gender-split { position:relative; z-index:5; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:900px; margin:0 auto; padding:0 2rem 4rem; }
.gender-card { border-radius:24px; overflow:hidden; cursor:pointer; border:1px solid rgba(255,255,255,0.08); transition:transform 0.3s,box-shadow 0.3s; }
.gender-card:hover { transform:translateY(-8px); box-shadow:0 32px 64px rgba(0,0,0,0.5); }
.gender-card-inner { padding:2.5rem 2rem 2rem; display:flex; flex-direction:column; align-items:center; min-height:420px; }
.card-men { background:linear-gradient(160deg,#0d2137,#1a3a5c 40%,#0d2a1a); }
.card-women { background:linear-gradient(160deg,#2a0d1a,#5c1a3a 40%,#1a0d2a); }
.golfer-svg { width:200px; height:240px; margin:1rem auto; display:block; }
.gender-label { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:#fff; margin-top:0.5rem; }
.gender-sub { color:rgba(255,255,255,0.5); font-size:0.8rem; margin-top:0.3rem; }
.gender-arrow { margin-top:1.5rem; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; background:rgba(255,255,255,0.1); }

/* INNER NAV */
.inner-nav { background:var(--dark); display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; }
.inner-left { display:flex; align-items:center; gap:1rem; }
.back-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:rgba(255,255,255,0.7); font-size:0.8rem; padding:0.4rem 1rem; cursor:pointer; font-family:'Noto Sans KR',sans-serif; }
.breadcrumb { color:rgba(255,255,255,0.4); font-size:0.8rem; }
.breadcrumb span { color:rgba(255,255,255,0.8); }
.comm-btn-sm { background:var(--green); border:none; border-radius:20px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700; padding:0.4rem 1rem; cursor:pointer; }

/* GENDER PAGE */
#gender-page { background:var(--cream); }
.gender-hero { padding:3rem 2rem 2rem; text-align:center; }
.gh-men { background:linear-gradient(135deg,#0d2137,#1a3a5c); }
.gh-women { background:linear-gradient(135deg,#2a0d1a,#5c1a3a); }
.gender-hero h2 { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900; color:#fff; }
.gender-hero p { color:rgba(255,255,255,0.5); margin-top:0.5rem; }
.brands-section { max-width:1000px; margin:0 auto; padding:3rem 2rem; }
.brands-section h3 { font-size:0.75rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.75rem; }
.brands-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; }
.brand-card { background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:1.5rem 1rem; text-align:center; cursor:pointer; transition:all 0.25s; display:flex; flex-direction:column; align-items:center; gap:0.75rem; }
.brand-card:hover { border-color:var(--green2); transform:translateY(-4px); box-shadow:0 12px 32px rgba(45,106,63,0.15); }
.brand-logo-wrap { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-card-name { font-weight:700; font-size:0.85rem; }
.brand-card-origin { font-size:0.7rem; color:var(--muted); }
.brand-card-count { background:var(--green3); color:var(--green); border-radius:10px; font-size:0.68rem; font-weight:700; padding:0.15rem 0.5rem; }

/* BRAND PAGE */
#brand-page { background:var(--bg); }
.brand-hero { background:var(--dark); padding:2rem; display:flex; align-items:center; gap:1.5rem; }
.brand-hero-logo { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-hero-info h2 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; }
.brand-hero-info p { color:rgba(255,255,255,0.4); font-size:0.8rem; }
.type-tabs { display:flex; gap:0.5rem; padding:1.5rem 2rem 0; overflow-x:auto; max-width:1000px; margin:0 auto; }
.type-tab { background:var(--surface); border:2px solid var(--border); border-radius:20px; padding:0.45rem 1.1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; white-space:nowrap; color:var(--muted); transition:all 0.2s; }
.type-tab.active { background:var(--green); border-color:var(--green); color:#fff; }
.clubs-list { max-width:1000px; margin:0 auto; padding:1.5rem 2rem 4rem; display:grid; gap:1rem; }
.club-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; }
.club-card-header { padding:1.5rem 1.5rem 1rem; display:flex; align-items:flex-start; justify-content:space-between; border-bottom:1px solid var(--border); }
.club-card-title h4 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
.club-card-title p { color:var(--muted); font-size:0.8rem; margin-top:0.2rem; }
.year-badge { background:var(--green3); color:var(--green); border-radius:8px; font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; }
.specs-wrap { padding:1.5rem; }
.specs-title { font-size:0.7rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
.specs-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:0.75rem; }
.spec-box { background:var(--bg); border-radius:12px; padding:1rem; text-align:center; }
.spec-icon { font-size:1.4rem; margin-bottom:0.4rem; }
.spec-name { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.3rem; }
.spec-val { font-size:0.95rem; font-weight:700; }
.dist-wrap { padding:0 1.5rem 1rem; }
.dist-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
.dist-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
.dist-val { font-size:1.1rem; font-weight:900; color:var(--green); }
.dist-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.dist-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--green),var(--gold2)); }
.dist-scale { display:flex; justify-content:space-between; margin-top:0.3rem; font-size:0.65rem; color:var(--muted); }
.club-tip { margin:0 1.5rem 1.5rem; background:linear-gradient(135deg,#f0f7f1,#e8f4e8); border-left:3px solid var(--green2); border-radius:0 12px 12px 0; padding:0.9rem 1rem; font-size:0.82rem; color:var(--green); line-height:1.6; }

/* REVIEW */
.review-wrap { border-top:1px solid var(--border); }
.review-top { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; }
.review-top-title { font-size:0.82rem; font-weight:700; }
.review-open-btn { background:none; border:1px solid var(--border); border-radius:16px; font-family:'Noto Sans KR',sans-serif; font-size:0.75rem; color:var(--muted); padding:0.3rem 0.9rem; cursor:pointer; }
.review-content { display:none; padding:0 1.5rem 1.5rem; border-top:1px solid var(--border); }
.review-form { background:var(--bg); border-radius:12px; padding:1rem; margin:1rem 0; }
.review-form-top { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.75rem; }
.review-name { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.9rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; color:var(--text); }
.stars-row { display:flex; gap:0.2rem; }
.star-item { font-size:1.3rem; cursor:pointer; color:#ddd; user-select:none; }
.star-item.lit { color:#f5a623; }
.review-text { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.65rem 1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; color:var(--text); resize:none; margin-bottom:0.75rem; }
.review-post-btn { background:var(--green); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700; padding:0.45rem 1.1rem; cursor:pointer; }
.review-item { display:flex; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid var(--border); }
.review-item:last-child { border-bottom:none; }
.review-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:700; color:#fff; flex-shrink:0; }
.review-bubble { flex:1; }
.review-meta { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.3rem; }
.review-author { font-size:0.82rem; font-weight:700; }
.review-stars-show { color:#f5a623; font-size:0.85rem; }
.review-date { font-size:0.7rem; color:var(--muted); }
.review-body-text { font-size:0.85rem; line-height:1.6; }

/* COMMUNITY */
#community-page { background:var(--bg); }
.comm-hero { background:linear-gradient(135deg,#0d2137,#1a3d1a); padding:3rem 2rem; text-align:center; }
.comm-hero h2 { font-family:'Playfair Display',serif; font-size:2.2rem; color:#fff; font-weight:900; }
.comm-hero p { color:rgba(255,255,255,0.5); margin-top:0.5rem; }
.comm-wrap { max-width:900px; margin:0 auto; padding:2rem; }
.cat-tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.cat-tab { background:var(--surface); border:2px solid var(--border); border-radius:20px; padding:0.5rem 1.2rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; color:var(--muted); transition:all 0.2s; }
.cat-tab.active { background:var(--green); border-color:var(--green); color:#fff; }
.write-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
.write-box h3 { font-size:0.85rem; font-weight:700; color:var(--muted); margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.08em; }
.write-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:0.75rem; }
.write-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; }
.write-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; cursor:pointer; }
.write-title { margin-bottom:0.75rem; }
.write-body { min-height:100px; resize:vertical; margin-bottom:0.75rem; }
.write-footer { display:flex; align-items:center; justify-content:space-between; }
.char-count { font-size:0.75rem; color:var(--muted); }
.post-btn { background:linear-gradient(135deg,var(--green),var(--green2)); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:0.9rem; padding:0.65rem 1.5rem; cursor:pointer; }
.posts-list { display:flex; flex-direction:column; gap:0.75rem; }
.post-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; cursor:pointer; transition:border-color 0.2s; }
.post-card:hover { border-color:var(--green2); }
.post-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; }
.post-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:#fff; flex-shrink:0; }
.post-meta { flex:1; }
.post-author { font-size:0.85rem; font-weight:700; }
.post-date { font-size:0.72rem; color:var(--muted); }
.cat-badge { font-size:0.65rem; font-weight:700; padding:0.2rem 0.6rem; border-radius:8px; background:var(--green3); color:var(--green); }
.post-title { font-weight:700; font-size:0.95rem; margin-bottom:0.4rem; }
.post-preview { font-size:0.83rem; color:var(--muted); line-height:1.6; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.loading-box { text-align:center; padding:3rem; color:var(--muted); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-box { text-align:center; padding:3rem; color:var(--muted); }

/* POST DETAIL */
#post-detail-page { background:var(--bg); }
.detail-wrap { max-width:800px; margin:0 auto; padding:2rem; }
.detail-header { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1rem; }
.detail-cat { display:inline-block; background:var(--green3); color:var(--green); border-radius:8px; font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; margin-bottom:1rem; }
.detail-title { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; margin-bottom:1rem; line-height:1.3; }
.detail-meta { display:flex; gap:1rem; color:var(--muted); font-size:0.8rem; padding-top:1rem; border-top:1px solid var(--border); align-items:center; }
.detail-body { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1.5rem; font-size:0.95rem; line-height:1.8; white-space:pre-wrap; }
.comments-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; }
.comments-title { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:1.25rem; }
.comment-form { display:flex; gap:0.75rem; margin-bottom:1.5rem; }
.comment-form-inner { flex:1; }
.comment-name { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.9rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; color:var(--text); margin-bottom:0.5rem; }
.comment-text { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.65rem 1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; color:var(--text); resize:none; min-height:70px; margin-bottom:0.5rem; }
.comment-submit { background:var(--green); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700; padding:0.45rem 1rem; cursor:pointer; }
.comment-item { display:flex; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid var(--border); }
.comment-item:last-child { border-bottom:none; }
.comment-bubble { flex:1; background:var(--bg); border-radius:0 12px 12px 12px; padding:0.75rem 1rem; }
.comment-meta { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.3rem; }
.comment-author { font-size:0.8rem; font-weight:700; }
.comment-date { font-size:0.7rem; color:var(--muted); }
.comment-body { font-size:0.85rem; line-height:1.6; }

/* TOAST */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--dark); color:#fff; padding:0.75rem 1.5rem; border-radius:20px; font-size:0.85rem; font-weight:700; transition:transform 0.3s; z-index:1000; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:600px) {
  .gender-split { grid-template-columns:1fr; }
  .specs-grid { grid-template-columns:repeat(2,1fr); }
  .write-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
  <div class="home-bg"></div>
  <nav class="home-nav">
    <div class="site-logo">Golf<span>Park</span></div>
    <button class="comm-btn" onclick="openCommunity()">💬 커뮤니티</button>
  </nav>
  <div class="home-hero">
    <div class="home-tagline">🏌️ 한국 시판 골프채 완전 가이드</div>
    <h1 class="home-title">당신의 게임을<br><em>바꿀 클럽</em>을 찾아보세요</h1>
    <p class="home-sub">브랜드별 스펙 · 비거리 · 초보자 팁까지 한눈에</p>
  </div>
  <div class="gender-split">
    <div class="gender-card" onclick="openGender('men')">
      <div class="gender-card-inner card-men">
        <svg class="golfer-svg" viewBox="0 0 200 240" fill="none">
          <ellipse cx="100" cy="225" rx="45" ry="6" fill="rgba(0,0,0,0.3)"/>
          <rect x="72" y="105" width="56" height="62" rx="12" fill="#1e4d7a"/>
          <path d="M88 105 L100 118 L112 105" stroke="white" stroke-width="2" fill="none"/>
          <path d="M72 115 Q40 85 28 60" stroke="#f5c99a" stroke-width="14" stroke-linecap="round" fill="none"/>
          <path d="M128 120 Q148 140 158 158" stroke="#f5c99a" stroke-width="14" stroke-linecap="round" fill="none"/>
          <line x1="158" y1="158" x2="168" y2="205" stroke="#c0c0c0" stroke-width="3" stroke-linecap="round"/>
          <rect x="162" y="203" width="14" height="6" rx="2" fill="#888"/>
          <circle cx="100" cy="78" r="26" fill="#f5c99a"/>
          <path d="M76 68 Q78 50 100 48 Q122 50 124 68 Q115 58 100 58 Q85 58 76 68Z" fill="#3a2010"/>
          <circle cx="92" cy="76" r="2.5" fill="#333"/>
          <circle cx="108" cy="76" r="2.5" fill="#333"/>
          <path d="M94 86 Q100 91 106 86" stroke="#c07050" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M74 63 Q76 44 100 42 Q124 44 126 63 Z" fill="#1a3d6e"/>
          <rect x="70" y="60" width="60" height="8" rx="4" fill="#1a3d6e"/>
          <rect x="72" y="162" width="24" height="50" rx="8" fill="#2d4a6e"/>
          <rect x="104" y="162" width="24" height="50" rx="8" fill="#2d4a6e"/>
          <ellipse cx="84" cy="212" rx="16" ry="7" fill="#222"/>
          <ellipse cx="116" cy="212" rx="16" ry="7" fill="#222"/>
        </svg>
        <div class="gender-label">남성 골프채</div>
        <div class="gender-sub">Men's Golf Clubs</div>
        <div class="gender-arrow">→</div>
      </div>
    </div>
    <div class="gender-card" onclick="openGender('women')">
      <div class="gender-card-inner card-women">
        <svg class="golfer-svg" viewBox="0 0 200 240" fill="none">
          <ellipse cx="100" cy="225" rx="45" ry="6" fill="rgba(0,0,0,0.3)"/>
          <path d="M78 162 Q80 205 68 215 Q85 218 100 217 Q115 218 132 215 Q120 205 122 162 Z" fill="#e75480"/>
          <rect x="76" y="105" width="48" height="60" rx="10" fill="#ff6b9d"/>
          <path d="M76 115 Q50 95 35 72" stroke="#f5c99a" stroke-width="13" stroke-linecap="round" fill="none"/>
          <path d="M124 118 Q145 135 155 155" stroke="#f5c99a" stroke-width="13" stroke-linecap="round" fill="none"/>
          <line x1="155" y1="155" x2="163" y2="205" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="100" cy="76" r="24" fill="#f5c99a"/>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL = 'https://dotjtqtyuualeoozfrbz.supabase.co';
var SUPA_KEY = 'sb_publishable_32vGfxI3IzdhUSVdmxGEYQ_O-4Obbrh';

var curGender = 'men';
var curBrand = '';
var curType = '';
var curCat = '전체';
var starRatings = {};

function sbFetch(method, table, data, filter) {
  var url = SUPA_URL + '/rest/v1/' + table + (filter || '');
  var headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : ''
  };
  var opts = { method: method, headers: headers };
  if (data) opts.body = JSON.stringify(data);
  return fetch(url, opts).then(function(r) { return r.json(); });
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function goHome() { showPage('home'); }
function goGenderPage() { showPage('gender-page'); }
function openCommunity() { showPage('community-page'); doLoadPosts(); }
function backToList() { showPage('community-page'); doLoadPosts(); }

function openGender(gender) {
  curGender = gender;
  document.getElementById('g-breadcrumb').textContent = gender === 'men' ? '남성 골프채' : '여성 골프채';
  var hero = document.getElementById('gender-hero');
  hero.className = 'gender-hero ' + (gender === 'men' ? 'gh-men' : 'gh-women');
  document.getElementById('gender-title').textContent = gender === 'men' ? '👨 남성 골프채' : '👩 여성 골프채';
  document.getElementById('gender-desc').textContent = gender === 'men' ? '브랜드를 선택하면 클럽 목록을 볼 수 있어요' : '여성 전용 클럽을 브랜드별로 비교해보세요';
  renderBrands(gender);
  showPage('gender-page');
}

function openBrand(brandId) {
  curBrand = brandId;
  var allBrands = brandsData.men.concat(brandsData.women);
  var info = allBrands.find(function(b) { return b.id === brandId; });
  document.getElementById('b-breadcrumb-g').textContent = curGender === 'men' ? '남성' : '여성';
  document.getElementById('b-breadcrumb-b').textContent = info ? info.name : brandId;
  document.getElementById('brand-hero-name').textContent = info ? info.name : brandId;
  document.getElementById('brand-hero-origin').textContent = info ? info.origin : '';
  document.getElementById('brand-hero-logo').innerHTML = makeLogo(info);
  var types = Object.keys(clubsData[brandId] || {});
  curType = types[0] || '';
  document.getElementById('type-tabs').innerHTML = types.map(function(t) {
    return '<button class="type-tab' + (t === curType ? ' active' : '') + '" onclick="changeType(\'' + t + '\',this)">' + typeEmoji(t) + ' ' + t + '</button>';
  }).join('');
  renderClubs();
  showPage('brand-page');
}

function changeType(type, tabEl) {
  curType = type;
  document.querySelectorAll('.type-tab').forEach(function(el) { el.classList.remove('active'); });
  tabEl.classList.add('active');
  renderClubs();
}

function typeEmoji(t) {
  var map = {'드라이버':'🚀','아이언':'🏌️','페어웨이우드':'🌲','하이브리드':'🔀','유틸리티':'🔀','웨지':'🪙','퍼터':'🎯'};
  return map[t] || '🏷️';
}

function renderBrands(gender) {
  var grid = document.getElementById('brands-grid');
  var list = brandsData[gender];
  grid.innerHTML = list.map(function(b) {
    var cnt = Object.values(clubsData[b.id] || {}).flat().length;
    return '<div class="brand-card" onclick="openBrand(\'' + b.id + '\')">' +
      '<div class="brand-logo-wrap">' + makeLogo(b) + '</div>' +
      '<div class="brand-card-name">' + b.name + '</div>' +
      '<div class="brand-card-origin">' + b.origin + '</div>' +
      '<div class="brand-card-count">' + cnt + '개 클럽</div>' +
      '</div>';
  }).join('');
}

function renderClubs() {
  var clubs = (clubsData[curBrand] || {})[curType] || [];
  var el = document.getElementById('clubs-list');
  if (!clubs.length) { el.innerHTML = '<p style="text-align:center;padding:3rem;color:var(--muted)">해당 종류의 클럽 정보가 없습니다</p>'; return; }
  el.innerHTML = clubs.map(function(c, i) {
    var isPutter = c.dist[1] === 0;
    var pct = isPutter ? 0 : Math.round(c.dist[1] / 300 * 100);
    var rid = curBrand + '_' + i;
    return '<div class="club-card">' +
      '<div class="club-card-header">' +
        '<div class="club-card-title"><h4>' + c.name + '</h4><p>' + curType + ' · ' + c.shaft + '</p></div>' +
        '<span class="year-badge">' + c.year + '</span>' +
      '</div>' +
      '<div class="specs-wrap">' +
        '<div class="specs-title">📋 스펙 한눈에 보기</div>' +
        '<div class="specs-grid">' +
          '<div class="spec-box"><div class="spec-icon">⚖️</div><div class="spec-name">헤드 무게</div><div class="spec-val">' + c.weight + '</div></div>' +
          '<div class="spec-box"><div class="spec-icon">📐</div><div class="spec-name">로프트각</div><div class="spec-val">' + c.loft + '</div></div>' +
          '<div class="spec-box"><div class="spec-icon">🚀</div><div class="spec-name">발사각</div><div class="spec-val">' + c.launch + '</div></div>' +
          '<div class="spec-box"><div class="spec-icon">🏹</div><div class="spec-name">탄도</div><div class="spec-val">' + c.traj + '</div></div>' +
          '<div class="spec-box" style="grid-column:1/-1"><div class="spec-icon">🪝</div><div class="spec-name">샤프트</div><div class="spec-val" style="font-size:0.82rem">' + c.shaft + '</div></div>' +
        '</div>' +
      '</div>' +
      (!isPutter ? '<div class="dist-wrap"><div class="dist-top"><span class="dist-label">🎯 아마추어 평균 비거리</span><span class="dist-val">' + c.dist[0] + 'm ~ ' + c.dist[1] + 'm</span></div><div class="dist-bar"><div class="dist-fill" style="width:' + pct + '%"></div></div><div class="dist-scale"><span>0m</span><span>100m</span><span>200m</span><span>300m+</span></div></div>' : '') +
      '<div class="club-tip"><strong>💡 초보자 TIP</strong><br>' + c.tip + '</div>' +
      '<div class="review-wrap">' +
        '<div class="review-top">' +
          '<span class="review-top-title">⭐ 사용자 리뷰</span>' +
          '<button class="review-open-btn" id="rbtn-' + rid + '" onclick="toggleReview(\'' + rid + '\',\'' + c.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">리뷰 보기 ▼</button>' +
        '</div>' +
        '<div class="review-content" id="rcontent-' + rid + '">' +
          '<div class="review-form">' +
            '<div class="review-form-top">' +
              '<input class="review-name" id="rname-' + rid + '" placeholder="닉네임" maxlength="20">' +
              '<div class="stars-row" id="rstars-' + rid + '">' +
                '<span class="star-item" onclick="clickStar(\'' + rid + '\',1)">☆</span>' +
                '<span class="star-item" onclick="clickStar(\'' + rid + '\',2)">☆</span>' +
                '<span class="star-item" onclick="clickStar(\'' + rid + '\',3)">☆</span>' +
                '<span class="star-item" onclick="clickStar(\'' + rid + '\',4)">☆</span>' +
                '<span class="star-item" onclick="clickStar(\'' + rid + '\',5)">☆</span>' +
              '</div>' +
            '</div>' +
            '<textarea class="review-text" id="rtext-' + rid + '" placeholder="이 골프채 사용해보셨나요? 솔직한 리뷰를 남겨주세요!" rows="2"></textarea>' +
            '<button class="review-post-btn" onclick="doReviewSubmit(\'' + rid + '\',\'' + curBrand + '\',\'' + c.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">리뷰 등록</button>' +
          '</div>' +
          '<div id="rlist-' + rid + '"><div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.82rem">리뷰 버튼을 눌러 확인하세요</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleReview(rid, clubName) {
  var content = document.getElementById('rcontent-' + rid);
  var openBtn = document.getElementById('rbtn-' + rid);
  if (content.style.display === 'none' || content.style.display === '') {
    content.style.display = 'block';
    openBtn.textContent = '리뷰 닫기 ▲';
    loadReviews(rid, curBrand, clubName);
  } else {
    content.style.display = 'none';
    openBtn.textContent = '리뷰 보기 ▼';
  }
}

function clickStar(rid, val) {
  starRatings[rid] = val;
  var stars = document.querySelectorAll('#rstars-' + rid + ' .star-item');
  stars.forEach(function(s, i) {
    s.textContent = i < val ? '★' : '☆';
    if (i < val) s.classList.add('lit'); else s.classList.remove('lit');
  });
}

function loadReviews(rid, brandId, clubName) {
  var listEl = document.getElementById('rlist-' + rid);
  listEl.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.82rem">로딩 중...</div>';
  sbFetch('GET', 'reviews', null, '?brand_id=eq.' + encodeURIComponent(brandId) + '&club_name=eq.' + encodeURIComponent(clubName) + '&order=created_at.desc')
  .then(function(reviews) {
    if (!reviews || reviews.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.82rem">아직 리뷰가 없어요. 첫 번째 리뷰를 남겨주세요! 😊</div>';
      return;
    }
    var colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    listEl.innerHTML = reviews.map(function(r) {
      var col = colors[Math.abs((r.author||'a').charCodeAt(0)) % colors.length];
      var date = new Date(r.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
      var stars = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
      return '<div class="review-item">' +
        '<div class="review-avatar" style="background:' + col + '">' + (r.author||'?')[0] + '</div>' +
        '<div class="review-bubble">' +
          '<div class="review-meta"><span class="review-author">' + (r.author||'익명') + '</span><span class="review-stars-show">' + stars + '</span><span class="review-date">' + date + '</span></div>' +
          '<div class="review-body-text">' + (r.content||'') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  });
}

function doReviewSubmit(rid, brandId, clubName) {
  var author = document.getElementById('rname-' + rid).value.trim();
  var content = document.getElementById('rtext-' + rid).value.trim();
  var rating = starRatings[rid] || 0;
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!rating) { showToast('별점을 선택해주세요!'); return; }
  if (!content) { showToast('리뷰 내용을 입력해주세요!'); return; }
  sbFetch('POST', 'reviews', {brand_id: brandId, club_name: clubName, author: author, rating: rating, content: content})
  .then(function() {
    document.getElementById('rname-' + rid).value = '';
    document.getElementById('rtext-' + rid).value = '';
    starRatings[rid] = 0;
    document.querySelectorAll('#rstars-' + rid + ' .star-item').forEach(function(s) { s.textContent = '☆'; s.classList.remove('lit'); });
    showToast('✅ 리뷰가 등록됐어요!');
    loadReviews(rid, brandId, clubName);
  });
}

function changeCat(cat, tabEl) {
  curCat = cat;
  document.querySelectorAll('.cat-tab').forEach(function(el) { el.classList.remove('active'); });
  tabEl.classList.add('active');
  doLoadPosts();
}

document.getElementById('w-body').addEventListener('input', function() {
  document.getElementById('w-count').textContent = this.value.length + ' / 1000';
});

function doLoadPosts() {
  var container = document.getElementById('posts-container');
  container.innerHTML = '<div class="loading-box"><div class="spinner"></div><p>게시글을 불러오는 중...</p></div>';
  var filter = '?order=created_at.desc&limit=50';
  if (curCat !== '전체') filter += '&category=eq.' + encodeURIComponent(curCat);
  sbFetch('GET', 'posts', null, filter).then(function(posts) {
    if (!posts || posts.length === 0) {
      container.innerHTML = '<div class="empty-box"><p style="font-size:3rem">📭</p><p style="margin-top:1rem">아직 게시글이 없어요!<br>첫 번째 글을 작성해보세요 😊</p></div>';
      return;
    }
    var colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    container.innerHTML = '<div class="posts-list">' + posts.map(function(p) {
      var col = colors[Math.abs((p.author||'a').charCodeAt(0)) % colors.length];
      var date = new Date(p.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      var preview = (p.content||'').slice(0,100) + ((p.content||'').length > 100 ? '...' : '');
      return '<div class="post-card" onclick="openPost(' + p.id + ')">' +
        '<div class="post-header">' +
          '<div class="post-avatar" style="background:' + col + '">' + (p.author||'?')[0] + '</div>' +
          '<div class="post-meta"><div class="post-author">' + (p.author||'익명') + '</div><div class="post-date">' + date + '</div></div>' +
          '<span class="cat-badge">' + (p.category||'') + '</span>' +
        '</div>' +
        '<div class="post-title">' + (p.title||'') + '</div>' +
        '<div class="post-preview">' + preview + '</div>' +
      '</div>';
    }).join('') + '</div>';
  });
}

function doPostSubmit() {
  var author = document.getElementById('w-author').value.trim();
  var category = document.getElementById('w-category').value;
  var title = document.getElementById('w-title').value.trim();
  var content = document.getElementById('w-body').value.trim();
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!title) { showToast('제목을 입력해주세요!'); return; }
  if (!content) { showToast('내용을 입력해주세요!'); return; }
  var submitEl = document.getElementById('post-submit-btn');
  submitEl.disabled = true;
  submitEl.textContent = '등록 중...';
  sbFetch('POST', 'posts', {author:author, category:category, title:title, content:content})
  .then(function() {
    document.getElementById('w-author').value = '';
    document.getElementById('w-title').value = '';
    document.getElementById('w-body').value = '';
    document.getElementById('w-count').textContent = '0 / 1000';
    showToast('✅ 게시글이 등록됐어요!');
    doLoadPosts();
  }).finally(function() {
    submitEl.disabled = false;
    submitEl.textContent = '게시하기 →';
  });
}

function openPost(postId) {
  showPage('post-detail-page');
  var wrap = document.getElementById('detail-wrap');
  wrap.innerHTML = '<div class="loading-box"><div class="spinner"></div><p>불러오는 중...</p></div>';
  sbFetch('GET', 'posts', null, '?id=eq.' + postId).then(function(posts) {
    var p = posts[0];
    var colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    var col = colors[Math.abs((p.author||'a').charCodeAt(0)) % colors.length];
    var date = new Date(p.created_at).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    wrap.innerHTML =
      '<div class="detail-header">' +
        '<div class="detail-cat">' + (p.category||'') + '</div>' +
        '<div class="detail-title">' + (p.title||'') + '</div>' +
        '<div class="detail-meta"><div class="post-avatar" style="background:' + col + ';width:28px;height:28px;font-size:0.75rem">' + (p.author||'?')[0] + '</div><span>' + (p.author||'익명') + '</span><span>' + date + '</span></div>' +
      '</div>' +
      '<div class="detail-body">' + (p.content||'') + '</div>' +
      '<div class="comments-wrap">' +
        '<div class="comments-title">💬 댓글</div>' +
        '<div class="comment-form">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:var(--green3);display:flex;align-items:center;justify-content:center;flex-shrink:0">🙂</div>' +
          '<div class="comment-form-inner">' +
            '<input class="comment-name" id="cname-' + postId + '" placeholder="닉네임" maxlength="20">' +
            '<textarea class="comment-text" id="ctext-' + postId + '" placeholder="댓글을 입력하세요..." rows="2"></textarea>' +
            '<button class="comment-submit" onclick="doCommentSubmit(' + postId + ')">댓글 등록</button>' +
          '</div>' +
        '</div>' +
        '<div id="comments-' + postId + '"><div style="text-align:center;padding:1rem;color:var(--muted)">로딩 중...</div></div>' +
      '</div>';
    loadComments(postId);
  });
}

function loadComments(postId) {
  sbFetch('GET', 'comments', null, '?post_id=eq.' + postId + '&order=created_at.asc').then(function(comments) {
    var listEl = document.getElementById('comments-' + postId);
    if (!comments || comments.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.85rem">아직 댓글이 없어요. 첫 댓글을 달아보세요! 😊</div>';
      return;
    }
    var colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    listEl.innerHTML = comments.map(function(c) {
      var col = colors[Math.abs((c.author||'a').charCodeAt(0)) % colors.length];
      var date = new Date(c.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return '<div class="comment-item">' +
        '<div class="post-avatar" style="background:' + col + ';width:32px;height:32px;font-size:0.78rem;flex-shrink:0">' + (c.author||'?')[0] + '</div>' +
        '<div class="comment-bubble"><div class="comment-meta"><span class="comment-author">' + (c.author||'익명') + '</span><span class="comment-date">' + date + '</span></div><div class="comment-body">' + (c.content||'') + '</div></div>' +
      '</div>';
    }).join('');
  });
}

function doCommentSubmit(postId) {
  var author = document.getElementById('cname-' + postId).value.trim();
  var content = document.getElementById('ctext-' + postId).value.trim();
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!content) { showToast('댓글 내용을 입력해주세요!'); return; }
  sbFetch('POST', 'comments', {post_id: postId, author: author, content: content}).then(function() {
    document.getElementById('cname-' + postId).value = '';
    document.getElementById('ctext-' + postId).value = '';
    showToast('✅ 댓글이 등록됐어요!');
    loadComments(postId);
  });
}
