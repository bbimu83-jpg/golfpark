<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GolfPark — 골프채 완전 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --dark: #0d1a0d;
  --green: #2d6a3f;
  --green2: #4a9c5a;
  --green3: #c8e6c9;
  --gold: #b8860b;
  --gold2: #d4a843;
  --cream: #fdf9f2;
  --text: #1a1a1a;
  --muted: #7a7a6e;
  --border: #e0ddd5;
  --surface: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; overflow-x:hidden; }

.page { display:none; min-height:100vh; }
.page.active { display:block; }

/* ── HOME ── */
#home { background:var(--dark); position:relative; overflow:hidden; }
.home-bg { position:absolute; inset:0; background:radial-gradient(ellipse 120% 80% at 50% -10%, #1a3d1a 0%, #0d1a0d 60%); }
.home-bg::before { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px),repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px); }

.home-nav { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:1.5rem 2rem; }
.site-logo { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:#fff; letter-spacing:-0.02em; }
.site-logo span { color:var(--gold2); }
.community-nav-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; font-weight:700; padding:0.5rem 1.2rem; cursor:pointer; transition:all 0.2s; }
.community-nav-btn:hover { background:rgba(255,255,255,0.2); }

.home-hero { position:relative; z-index:5; text-align:center; padding:2rem 2rem 0; }
.home-tagline { display:inline-block; border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:0.35rem 1.2rem; font-size:0.72rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold2); margin-bottom:1.2rem; }
.home-title { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,7vw,4.5rem); font-weight:900; line-height:1.05; color:#fff; margin-bottom:0.8rem; }
.home-title em { color:var(--gold2); font-style:italic; }
.home-sub { color:rgba(255,255,255,0.5); font-size:0.95rem; margin-bottom:3rem; }

.gender-split { position:relative; z-index:5; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:900px; margin:0 auto; padding:0 2rem 4rem; }
.gender-card { border-radius:24px; overflow:hidden; cursor:pointer; position:relative; transition:transform 0.35s cubic-bezier(.2,.8,.2,1),box-shadow 0.35s; border:1px solid rgba(255,255,255,0.08); }
.gender-card:hover { transform:translateY(-8px) scale(1.02); box-shadow:0 32px 64px rgba(0,0,0,0.5); }
.gender-card-inner { padding:2.5rem 2rem 2rem; display:flex; flex-direction:column; align-items:center; min-height:420px; position:relative; }
.card-men { background:linear-gradient(160deg,#0d2137 0%,#1a3a5c 40%,#0d2a1a 100%); }
.card-women { background:linear-gradient(160deg,#2a0d1a 0%,#5c1a3a 40%,#1a0d2a 100%); }
.golfer-svg { width:200px; height:240px; margin:1rem auto; display:block; }
.gender-label { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; color:#fff; margin-top:0.5rem; }
.gender-sub { color:rgba(255,255,255,0.5); font-size:0.8rem; margin-top:0.3rem; }
.gender-arrow { margin-top:1.5rem; width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; background:rgba(255,255,255,0.1); transition:transform 0.2s; }
.gender-card:hover .gender-arrow { transform:translateX(4px); }

/* ── INNER NAV ── */
.inner-nav { background:var(--dark); display:flex; align-items:center; justify-content:space-between; padding:1rem 2rem; }
.inner-nav-left { display:flex; align-items:center; gap:1rem; }
.back-btn { background:none; border:1px solid rgba(255,255,255,0.2); border-radius:20px; color:rgba(255,255,255,0.7); font-size:0.8rem; padding:0.4rem 1rem; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.2s; }
.back-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.breadcrumb { color:rgba(255,255,255,0.4); font-size:0.8rem; }
.breadcrumb span { color:rgba(255,255,255,0.8); }
.community-btn-small { background:var(--green); border:none; border-radius:20px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700; padding:0.4rem 1rem; cursor:pointer; }

/* ── GENDER PAGE ── */
#gender-page { background:var(--cream); }
.gender-hero { padding:3rem 2rem 2rem; text-align:center; }
.gender-hero-men { background:linear-gradient(135deg,#0d2137,#1a3a5c); }
.gender-hero-women { background:linear-gradient(135deg,#2a0d1a,#5c1a3a); }
.gender-hero h2 { font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:900; color:#fff; }
.gender-hero p { color:rgba(255,255,255,0.5); margin-top:0.5rem; }
.brands-section { max-width:1000px; margin:0 auto; padding:3rem 2rem; }
.brands-section h3 { font-size:0.75rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:1.5rem; border-bottom:1px solid var(--border); padding-bottom:0.75rem; }
.brands-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; }
.brand-logo-card { background:var(--surface); border:2px solid var(--border); border-radius:16px; padding:1.5rem 1rem; text-align:center; cursor:pointer; transition:all 0.25s; display:flex; flex-direction:column; align-items:center; gap:0.75rem; }
.brand-logo-card:hover { border-color:var(--green2); transform:translateY(-4px); box-shadow:0 12px 32px rgba(45,106,63,0.15); }
.brand-logo-svg { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-logo-name { font-weight:700; font-size:0.85rem; }
.brand-logo-origin { font-size:0.7rem; color:var(--muted); }
.brand-logo-count { background:var(--green3); color:var(--green); border-radius:10px; font-size:0.68rem; font-weight:700; padding:0.15rem 0.5rem; }

/* ── BRAND PAGE ── */
#brand-page { background:var(--bg); }
.brand-hero { background:var(--dark); padding:2rem; display:flex; align-items:center; gap:1.5rem; }
.brand-hero-logo { width:80px; height:50px; display:flex; align-items:center; justify-content:center; }
.brand-hero-info h2 { font-family:'Playfair Display',serif; font-size:1.8rem; color:#fff; }
.brand-hero-info p { color:rgba(255,255,255,0.4); font-size:0.8rem; }
.type-tabs { display:flex; gap:0.5rem; padding:1.5rem 2rem 0; overflow-x:auto; max-width:1000px; margin:0 auto; }
.type-tab { background:var(--surface); border:2px solid var(--border); border-radius:20px; padding:0.45rem 1.1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.2s; color:var(--muted); }
.type-tab:hover { border-color:var(--green2); color:var(--green); }
.type-tab.active { background:var(--green); border-color:var(--green); color:#fff; }
.clubs-list { max-width:1000px; margin:0 auto; padding:1.5rem 2rem 4rem; display:grid; gap:1rem; }

.club-detail-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; overflow:hidden; }
.club-card-header { padding:1.5rem 1.5rem 1rem; display:flex; align-items:flex-start; justify-content:space-between; border-bottom:1px solid var(--border); }
.club-card-title h4 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; }
.club-card-title p { color:var(--muted); font-size:0.8rem; margin-top:0.2rem; }
.club-year-badge { background:var(--green3); color:var(--green); border-radius:8px; font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; }
.specs-wrap { padding:1.5rem; }
.specs-title { font-size:0.7rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }
.specs-row { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:0.75rem; }
.spec-box { background:var(--bg); border-radius:12px; padding:1rem; text-align:center; }
.spec-icon { font-size:1.4rem; margin-bottom:0.4rem; }
.spec-name { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:0.3rem; }
.spec-val { font-size:0.95rem; font-weight:700; }
.dist-section { padding:0 1.5rem 1rem; }
.dist-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
.dist-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
.dist-range { font-size:1.1rem; font-weight:900; color:var(--green); }
.dist-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.dist-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--green),var(--gold2)); }
.dist-scale { display:flex; justify-content:space-between; margin-top:0.3rem; font-size:0.65rem; color:var(--muted); }
.club-tip { margin:0 1.5rem 1.5rem; background:linear-gradient(135deg,#f0f7f1,#e8f4e8); border-left:3px solid var(--green2); border-radius:0 12px 12px 0; padding:0.9rem 1rem; font-size:0.82rem; color:var(--green); line-height:1.6; }

/* ── COMMUNITY PAGE ── */
#community-page { background:var(--bg); }
.community-hero { background:linear-gradient(135deg,#0d2137,#1a3d1a); padding:3rem 2rem; text-align:center; }
.community-hero h2 { font-family:'Playfair Display',serif; font-size:2.2rem; color:#fff; font-weight:900; }
.community-hero p { color:rgba(255,255,255,0.5); margin-top:0.5rem; }

.community-wrap { max-width:900px; margin:0 auto; padding:2rem; }

/* 카테고리 탭 */
.cat-tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.cat-tab { background:var(--surface); border:2px solid var(--border); border-radius:20px; padding:0.5rem 1.2rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:all 0.2s; color:var(--muted); }
.cat-tab:hover { border-color:var(--green2); color:var(--green); }
.cat-tab.active { background:var(--green); border-color:var(--green); color:#fff; }

/* 글쓰기 박스 */
.write-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
.write-box h3 { font-size:0.85rem; font-weight:700; color:var(--muted); margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.08em; }
.write-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; margin-bottom:0.75rem; }
.write-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; transition:border-color 0.2s; }
.write-input:focus { outline:none; border-color:var(--green2); }
.write-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; cursor:pointer; }
.write-title { margin-bottom:0.75rem; }
.write-body { min-height:100px; resize:vertical; margin-bottom:0.75rem; }
.write-footer { display:flex; align-items:center; justify-content:space-between; }
.char-count { font-size:0.75rem; color:var(--muted); }
.submit-btn { background:linear-gradient(135deg,var(--green),var(--green2)); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:0.9rem; padding:0.65rem 1.5rem; cursor:pointer; transition:opacity 0.2s; }
.submit-btn:hover { opacity:0.85; }
.submit-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* 게시글 목록 */
.posts-list { display:flex; flex-direction:column; gap:0.75rem; }
.post-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; transition:border-color 0.2s; cursor:pointer; }
.post-card:hover { border-color:var(--green2); }
.post-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem; }
.avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:#fff; flex-shrink:0; }
.post-meta { flex:1; }
.post-author { font-size:0.85rem; font-weight:700; }
.post-date { font-size:0.72rem; color:var(--muted); }
.post-category-badge { font-size:0.65rem; font-weight:700; padding:0.2rem 0.6rem; border-radius:8px; background:var(--green3); color:var(--green); }
.post-title { font-weight:700; font-size:0.95rem; margin-bottom:0.4rem; }
.post-body-preview { font-size:0.83rem; color:var(--muted); line-height:1.6; margin-bottom:0.75rem; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.post-footer { display:flex; gap:1rem; }
.post-stat { font-size:0.75rem; color:var(--muted); }

/* 로딩/빈상태 */
.loading-box { text-align:center; padding:3rem; color:var(--muted); }
.loading-spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty-box { text-align:center; padding:3rem; color:var(--muted); }
.empty-icon { font-size:3rem; margin-bottom:1rem; }

/* 게시글 상세 */
#post-detail-page { background:var(--bg); }
.post-detail-wrap { max-width:800px; margin:0 auto; padding:2rem; }
.post-detail-header { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1rem; }
.post-detail-cat { display:inline-block; background:var(--green3); color:var(--green); border-radius:8px; font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; margin-bottom:1rem; }
.post-detail-title { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; margin-bottom:1rem; line-height:1.3; }
.post-detail-meta { display:flex; gap:1rem; color:var(--muted); font-size:0.8rem; padding-top:1rem; border-top:1px solid var(--border); }
.post-detail-body { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; margin-bottom:1.5rem; font-size:0.95rem; line-height:1.8; white-space:pre-wrap; }

/* 댓글 */
.comments-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; }
.comments-title { font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:1.25rem; }
.comment-form { display:flex; gap:0.75rem; margin-bottom:1.5rem; }
.comment-avatar { width:36px; height:36px; border-radius:50%; background:var(--green3); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
.comment-input-wrap { flex:1; }
.comment-name-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.9rem; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; color:var(--text); margin-bottom:0.5rem; transition:border-color 0.2s; }
.comment-name-input:focus { outline:none; border-color:var(--green2); }
.comment-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.65rem 1rem; font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; color:var(--text); resize:none; transition:border-color 0.2s; min-height:70px; }
.comment-textarea:focus { outline:none; border-color:var(--green2); }
.comment-submit { margin-top:0.5rem; background:var(--green); border:none; border-radius:8px; color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:0.8rem; font-weight:700; padding:0.45rem 1rem; cursor:pointer; }
.comment-item { display:flex; gap:0.75rem; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
.comment-item:last-child { border-bottom:none; margin-bottom:0; }
.comment-bubble { flex:1; background:var(--bg); border-radius:0 12px 12px 12px; padding:0.75rem 1rem; }
.comment-meta { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.3rem; }
.comment-author { font-size:0.8rem; font-weight:700; }
.comment-date { font-size:0.7rem; color:var(--muted); }
.comment-text { font-size:0.85rem; line-height:1.6; }

/* ── 리뷰 섹션 ── */
.review-section { border-top:1px solid var(--border); }
.review-header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; }
.review-title { font-size:0.82rem; font-weight:700; color:var(--text); }
.review-toggle-btn { background:none; border:1px solid var(--border); border-radius:16px; font-family:"Noto Sans KR",sans-serif; font-size:0.75rem; color:var(--muted); padding:0.3rem 0.9rem; cursor:pointer; transition:all 0.2s; }
.review-toggle-btn:hover { border-color:var(--green2); color:var(--green); }
.review-body { padding:0 1.5rem 1.5rem; border-top:1px solid var(--border); }
.review-write { background:var(--bg); border-radius:12px; padding:1rem; margin:1rem 0; }
.review-write-top { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.75rem; }
.review-input-name { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.55rem 0.9rem; font-family:"Noto Sans KR",sans-serif; font-size:0.82rem; color:var(--text); }
.review-input-name:focus { outline:none; border-color:var(--green2); }
.star-select { display:flex; gap:0.2rem; }
.star { font-size:1.3rem; cursor:pointer; color:#ddd; transition:color 0.15s; user-select:none; }
.star.on { color:#f5a623; }
.review-input-text { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.65rem 1rem; font-family:"Noto Sans KR",sans-serif; font-size:0.85rem; color:var(--text); resize:none; margin-bottom:0.75rem; }
.review-input-text:focus { outline:none; border-color:var(--green2); }
.review-submit-btn { background:var(--green); border:none; border-radius:8px; color:#fff; font-family:"Noto Sans KR",sans-serif; font-size:0.8rem; font-weight:700; padding:0.45rem 1.1rem; cursor:pointer; }
.review-item { display:flex; gap:0.75rem; padding:0.75rem 0; border-bottom:1px solid var(--border); }
.review-item:last-child { border-bottom:none; }
.review-bubble { flex:1; }
.review-meta { display:flex; gap:0.75rem; align-items:center; margin-bottom:0.3rem; }
.review-author { font-size:0.82rem; font-weight:700; }
.review-stars { color:#f5a623; font-size:0.85rem; }
.review-date { font-size:0.7rem; color:var(--muted); }
.review-text { font-size:0.85rem; line-height:1.6; }

/* 알림 토스트 */
.toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(100px); background:var(--dark); color:#fff; padding:0.75rem 1.5rem; border-radius:20px; font-size:0.85rem; font-weight:700; transition:transform 0.3s; z-index:1000; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:600px) {
  .gender-split { grid-template-columns:1fr; }
  .specs-row { grid-template-columns:repeat(2,1fr); }
  .write-row { grid-template-columns:1fr; }
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-up { animation:fadeUp 0.5s ease both; }
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="home" class="page active">
  <div class="home-bg"></div>
  <nav class="home-nav">
    <div class="site-logo">Golf<span>Park</span></div>
    <button class="community-nav-btn" onclick="showPage('community-page')">💬 커뮤니티</button>
  </nav>
  <div class="home-hero fade-up">
    <div class="home-tagline">🏌️ 한국 시판 골프채 완전 가이드</div>
    <h1 class="home-title">당신의 게임을<br><em>바꿀 클럽</em>을 찾아보세요</h1>
    <p class="home-sub">브랜드별 스펙 · 비거리 · 초보자 팁까지 한눈에</p>
  </div>
  <div class="gender-split">
    <div class="gender-card" onclick="goGender('men')">
      <div class="gender-card-inner card-men">
        <svg class="golfer-svg" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">

async function supabase(method, table, data = null, filter = '') {
  const url = `${SUPABASE_URL}/rest/v1/${table}${filter}`;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'return=representation' : '',
  };
  const options = { method, headers };
  if (data) options.body = JSON.stringify(data);
  const res = await fetch(url, options);
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  return method === 'DELETE' ? null : res.json();
}

// ══ 커뮤니티 ══
let selectedCat = '전체';

function selectCat(cat, btn) {
  selectedCat = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadPosts();
}

document.getElementById('write-body').addEventListener('input', function() {
  document.getElementById('char-count').textContent = `${this.value.length} / 1000`;
});

async function loadPosts() {
  const container = document.getElementById('posts-container');
  container.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p>게시글을 불러오는 중...</p></div>`;
  try {
    let filter = '?order=created_at.desc&limit=50';
    if (selectedCat !== '전체') filter += `&category=eq.${encodeURIComponent(selectedCat)}`;
    const posts = await supabase('GET', 'posts', null, filter);
    if (!posts || posts.length === 0) {
      container.innerHTML = `<div class="empty-box"><div class="empty-icon">📭</div><p>아직 게시글이 없어요!<br>첫 번째 글을 작성해보세요 😊</p></div>`;
      return;
    }
    const colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a','#6a2d2d'];
    container.innerHTML = `<div class="posts-list">${posts.map(p => {
      const col = colors[Math.abs((p.author||'').charCodeAt(0)||0) % colors.length];
      const date = new Date(p.created_at).toLocaleDateString('ko-KR', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const preview = (p.content||'').slice(0, 100) + ((p.content||'').length > 100 ? '...' : '');
      return `<div class="post-card" onclick="openPost(${p.id})">
        <div class="post-header">
          <div class="avatar" style="background:${col}">${(p.author||'?')[0]}</div>
          <div class="post-meta"><div class="post-author">${p.author||'익명'}</div><div class="post-date">${date}</div></div>
          <span class="post-category-badge">${p.category||''}</span>
        </div>
        <div class="post-title">${p.title||''}</div>
        <div class="post-body-preview">${preview}</div>
      </div>`;
    }).join('')}</div>`;
  } catch(e) {
    container.innerHTML = `<div class="empty-box"><div class="empty-icon">⚠️</div><p>게시글을 불러오지 못했어요<br>잠시 후 다시 시도해주세요</p></div>`;
  }
}

async function submitPost() {
  const author = document.getElementById('write-author').value.trim();
  const category = document.getElementById('write-category').value;
  const title = document.getElementById('write-title').value.trim();
  const content = document.getElementById('write-body').value.trim();
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!title) { showToast('제목을 입력해주세요!'); return; }
  if (!content) { showToast('내용을 입력해주세요!'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '등록 중...';
  try {
    await supabase('POST', 'posts', { author, category, title, content });
    document.getElementById('write-author').value = '';
    document.getElementById('write-title').value = '';
    document.getElementById('write-body').value = '';
    document.getElementById('char-count').textContent = '0 / 1000';
    showToast('✅ 게시글이 등록됐어요!');
    loadPosts();
  } catch(e) {
    showToast('❌ 등록에 실패했어요. 다시 시도해주세요.');
  } finally {
    btn.disabled = false;
    btn.textContent = '게시하기 →';
  }
}

async function openPost(postId) {
  currentPostId = postId;
  showPage('post-detail-page');
  const content = document.getElementById('post-detail-content');
  content.innerHTML = `<div class="loading-box"><div class="loading-spinner"></div><p>불러오는 중...</p></div>`;
  try {
    const posts = await supabase('GET', 'posts', null, `?id=eq.${postId}`);
    const post = posts[0];
    const date = new Date(post.created_at).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
    const colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    const col = colors[Math.abs((post.author||'').charCodeAt(0)||0) % colors.length];
    content.innerHTML = `
      <div class="post-detail-header">
        <div class="post-detail-cat">${post.category||''}</div>
        <div class="post-detail-title">${post.title||''}</div>
        <div class="post-detail-meta">
          <div class="avatar" style="background:${col};width:28px;height:28px;font-size:0.75rem">${(post.author||'?')[0]}</div>
          <span>${post.author||'익명'}</span>
          <span>${date}</span>
        </div>
      </div>
      <div class="post-detail-body">${post.content||''}</div>
      <div class="comments-box">
        <div class="comments-title">💬 댓글</div>
        <div class="comment-form">
          <div class="comment-avatar">🙂</div>
          <div class="comment-input-wrap">
            <input class="comment-name-input" id="c-author" placeholder="닉네임" maxlength="20">
            <textarea class="comment-textarea" id="c-content" placeholder="댓글을 입력하세요..." rows="2"></textarea>
            <button class="comment-submit" onclick="submitComment(${postId})">댓글 등록</button>
          </div>
        </div>
        <div id="comments-list"><div class="loading-box" style="padding:1rem"><div class="loading-spinner" style="width:20px;height:20px;border-width:2px"></div></div></div>
      </div>`;
    loadComments(postId);
  } catch(e) {
    content.innerHTML = `<div class="empty-box"><div class="empty-icon">⚠️</div><p>게시글을 불러오지 못했어요</p></div>`;
  }
}

async function loadComments(postId) {
  const list = document.getElementById('comments-list');
  try {
    const comments = await supabase('GET', 'comments', null, `?post_id=eq.${postId}&order=created_at.asc`);
    if (!comments || comments.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.85rem">아직 댓글이 없어요. 첫 댓글을 달아보세요! 😊</div>`;
      return;
    }
    const colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    list.innerHTML = comments.map(c => {
      const col = colors[Math.abs((c.author||'').charCodeAt(0)||0) % colors.length];
      const date = new Date(c.created_at).toLocaleDateString('ko-KR', {month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="comment-item">
        <div class="avatar" style="background:${col};width:32px;height:32px;font-size:0.78rem;flex-shrink:0">${(c.author||'?')[0]}</div>
        <div class="comment-bubble">
          <div class="comment-meta"><span class="comment-author">${c.author||'익명'}</span><span class="comment-date">${date}</span></div>
          <div class="comment-text">${c.content||''}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '';
  }
}

async function submitComment(postId) {
  const author = document.getElementById('c-author').value.trim();
  const content = document.getElementById('c-content').value.trim();
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!content) { showToast('댓글 내용을 입력해주세요!'); return; }
  try {
    await supabase('POST', 'comments', { post_id: postId, author, content });
    document.getElementById('c-author').value = '';
    document.getElementById('c-content').value = '';
    showToast('✅ 댓글이 등록됐어요!');
    loadComments(postId);
  } catch(e) {
    showToast('❌ 댓글 등록에 실패했어요');
  }
}

window.addEventListener('load', () => {
  // 커뮤니티 페이지 진입시 자동 로드를 위해 준비만
});

// 커뮤니티 페이지 진입시 게시글 로드
const origShowPage = showPage;

// ══ 리뷰 기능 ══
const starState = {};

function toggleReview(brandId, idx, toggleBtn) {
  const clubName = toggleBtn.dataset.name;
  const body = document.getElementById('review-body-'+brandId+'-'+idx);
  const toggleEl = document.getElementById('rtoggle-'+brandId+'-'+idx);
  if (body.style.display === 'none') {
    body.style.display = 'block';
    toggleEl.textContent = '리뷰 닫기 ▲';
    loadReviews(brandId, idx, clubName);
  } else {
    body.style.display = 'none';
    toggleEl.textContent = '리뷰 보기 ▼';
  }
}

function setStar(brandId, idx, val) {
  const key = `${brandId}-${idx}`;
  starState[key] = val;
  const stars = document.querySelectorAll(`#stars-${brandId}-${idx} .star`);
  stars.forEach(s => {
    s.textContent = parseInt(s.dataset.val) <= val ? '★' : '☆';
    s.classList.toggle('on', parseInt(s.dataset.val) <= val);
  });
}

async function loadReviews(brandId, idx, clubName) {
  const list = document.getElementById(`review-list-${brandId}-${idx}`);
  try {
    const reviews = await supabase('GET', 'reviews', null,
      `?brand_id=eq.${encodeURIComponent(brandId)}&club_name=eq.${encodeURIComponent(clubName)}&order=created_at.desc`);
    if (!reviews || reviews.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.82rem">아직 리뷰가 없어요. 첫 번째 리뷰를 남겨주세요! 😊</div>';
      return;
    }
    const colors = ['#2d6a3f','#1a3a5c','#5c1a3a','#b8860b','#4a4a8a'];
    list.innerHTML = reviews.map(r => {
      const col = colors[Math.abs((r.author||'').charCodeAt(0)||0) % colors.length];
      const date = new Date(r.created_at).toLocaleDateString('ko-KR', {month:'long',day:'numeric'});
      const stars = '★'.repeat(r.rating||0) + '☆'.repeat(5-(r.rating||0));
      return `<div class="review-item">
        <div class="avatar" style="background:${col};width:32px;height:32px;font-size:0.78rem;flex-shrink:0">${(r.author||'?')[0]}</div>
        <div class="review-bubble">
          <div class="review-meta">
            <span class="review-author">${r.author||'익명'}</span>
            <span class="review-stars">${stars}</span>
            <span class="review-date">${date}</span>
          </div>
          <div class="review-text">${r.content||''}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--muted);font-size:0.82rem">리뷰를 불러오지 못했어요</div>';
  }
}

async function submitReview(brandId, idx, submitBtn) {
  const clubName = submitBtn.dataset.name;
  const author = document.getElementById(`rname-${brandId}-${idx}`).value.trim();
  const content = document.getElementById(`rtext-${brandId}-${idx}`).value.trim();
  const rating = starState[`${brandId}-${idx}`] || 0;
  if (!author) { showToast('닉네임을 입력해주세요!'); return; }
  if (!rating) { showToast('별점을 선택해주세요!'); return; }
  if (!content) { showToast('리뷰 내용을 입력해주세요!'); return; }
  try {
    await supabase('POST', 'reviews', { brand_id: brandId, club_name: clubName, author, rating, content });
    document.getElementById(`rname-${brandId}-${idx}`).value = '';
    document.getElementById(`rtext-${brandId}-${idx}`).value = '';
    setStar(brandId, idx, 0);
    starState[`${brandId}-${idx}`] = 0;
    document.querySelectorAll(`#stars-${brandId}-${idx} .star`).forEach(s => {
      s.textContent = '☆'; s.classList.remove('on');
    });
    showToast('✅ 리뷰가 등록됐어요!');
    loadReviews(brandId, idx, clubName);
  } catch(e) {
    showToast('❌ 등록에 실패했어요');
  }
}
